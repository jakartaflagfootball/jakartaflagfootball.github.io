<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournaments — JFF Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">
    <img src="jff-logo.png" alt="JFF">
    <div class="nav-logo-text">Jakarta Flag Football<span>Stats Hub</span></div>
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="tournaments.html" class="active">Tournaments</a>
    <a href="teams.html">Teams</a>
    <a href="players.html">Players</a>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1 class="page-title">Tournaments</h1>
    <p class="page-sub">Full history of JFF competitions</p>
  </div>
</div>

<div class="container" style="padding-top:2rem">
  <div class="filter-bar">
    <input type="text" id="searchInput" class="search-input" placeholder="Search tournaments...">
    <select id="genderFilter" class="filter-select">
      <option value="">All divisions</option>
      <option value="M">Men's</option>
      <option value="F">Women's</option>
    </select>
    <select id="yearFilter" class="filter-select">
      <option value="">All years</option>
    </select>
  </div>
</div>

<div class="container" style="padding-bottom:4rem">
  <div class="tournament-list" id="tournamentList">
    <div class="loading">Loading...</div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-content" id="modalContent"></div>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-logo"><img src="jff-logo.png" alt="JFF"></div>
    <p>Jakarta Flag Football · Est. 2022</p>
  </div>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    await loadData();

    const years = [...new Set(competitions.map(c => c.start_date?.split('-')[0]).filter(Boolean))].sort().reverse();
    const yf = document.getElementById('yearFilter');
    years.forEach(y => yf.innerHTML += `<option value="${y}">${y}</option>`);

    renderList();
    document.getElementById('searchInput').addEventListener('input', renderList);
    document.getElementById('genderFilter').addEventListener('change', renderList);
    document.getElementById('yearFilter').addEventListener('change', renderList);
  });

  function renderList() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const gender = document.getElementById('genderFilter').value;
    const year   = document.getElementById('yearFilter').value;

    const filtered = competitions.filter(c => {
      if (search && !c.name?.toLowerCase().includes(search)) return false;
      if (gender && c.gender !== gender) return false;
      if (year && !c.start_date?.startsWith(year)) return false;
      return true;
    }).sort((a,b) => (b.start_date||'').localeCompare(a.start_date||''));

    const list = document.getElementById('tournamentList');
    if (!filtered.length) {
      list.innerHTML = '<p class="empty">No tournaments found.</p>';
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="tournament-row" onclick="openTournament('${t.id}')">
        <div class="tr-left">
          <div class="tr-name">${t.name}</div>
          <div class="tr-meta">
            ${t.start_date || ''}
            ${t.location ? ' · ' + t.location : ''}
            ${t.gender === 'M' ? " · Men's" : t.gender === 'F' ? " · Women's" : ''}
          </div>
        </div>
        <div class="tr-right">
          <span class="tr-badge">${t.num_teams || 0} teams</span>
          <span class="tr-badge">${t.num_matches || 0} matches</span>
          <span class="tr-arrow">→</span>
        </div>
      </div>
    `).join('');
  }

  function openTournament(id) {
    const comp = competitions.find(c => c.id === id);
    if (!comp) return;

    const PLAYOFF_ORDER = {
      '': 0,
      'Quarterfinal': 1,
      'Semifinal': 2,
      'Consolation Semifinal 1': 3, 'Consolation Semifinal 2': 4,
      'Seed 3 Semifinal: #9 vs #12': 3, 'Seed 3 Semifinal: #10 vs #11': 4,
      'Seed 4 Semifinal: #13 vs #16': 3, 'Seed 4 Semifinal: #14 vs #15': 4,
      'Placement Round Robin 1': 5, 'Placement Round Robin 2': 6, 'Placement Round Robin 3': 7,
      '15th Place': 8, '13th Place': 9, '11th Place': 10, '9th Place': 11,
      '7th Place': 12, '5th Place': 13, '3rd Place': 14,
      'Final': 15,
    };
    function playoffRank(label) {
      const l = (label || '').trim();
      // normalise casing e.g. "11th place" -> "11th Place"
      const norm = l.replace(/\b(\d+(?:st|nd|rd|th)) place\b/i, (m, p1) => p1 + ' Place');
      if (norm in PLAYOFF_ORDER) return PLAYOFF_ORDER[norm];
      if (l in PLAYOFF_ORDER) return PLAYOFF_ORDER[l];
      return 2.5; // unknown labels after Semifinal, before placement games
    }
    const compMatches = matches
      .filter(m => m.competition === comp.name)
      .sort((a,b) => {
        const sa = parseInt(a.stage)||0, sb = parseInt(b.stage)||0;
        if (sa !== sb) return sa - sb;
        if (sa === 2) return playoffRank(a.round_label) - playoffRank(b.round_label);
        return (parseInt(a.round)||0) - (parseInt(b.round)||0);
      });

    const compStandings = standings
      .filter(s => s.competition === comp.name && s.is_final === 'True')
      .sort((a,b) => (parseInt(a.place)||99) - (parseInt(b.place)||99));

    const compAwards = awards.filter(a => a.competition === comp.name);

    let html = `
      <div class="modal-title">${comp.name}</div>
      <div class="modal-meta">
        ${comp.start_date || ''}${comp.end_date ? ' → ' + comp.end_date : ''}
        ${comp.location ? ' · ' + comp.location : ''}
      </div>`;

    if (compStandings.length) {
      html += `<h3 class="modal-section-title">Final Standings</h3>
        <table class="modal-table">
          <tr><th>#</th><th>Team</th><th>W</th><th>L</th><th>Pts</th><th>+/-</th></tr>`;
      compStandings.forEach(s => {
        const medal = s.place == 1 ? '🥇' : s.place == 2 ? '🥈' : s.place == 3 ? '🥉' : `#${s.place}`;
        html += `<tr>
          <td>${medal}</td>
          <td><a href="teams.html?team=${encodeURIComponent(s.team)}" onclick="closeModal()">${s.team}</a></td>
          <td>${s.wins}</td><td>${s.losses}</td><td>${s.points}</td><td>${s.score_diff}</td>
        </tr>`;
      });
      html += `</table>`;
    }

    if (compMatches.length) {
      html += `<h3 class="modal-section-title">Match Results</h3>`;
      let lastStage = null;
      let lastRoundLabel = null;
      compMatches.forEach(m => {
        if (m.stage !== lastStage) {
          const stageLabel = m.stage == '1' ? 'Group Stage' : m.stage == '2' ? 'Playoffs' : 'Stage ' + m.stage;
          html += `<div class="stage-label">${stageLabel}</div>`;
          lastStage = m.stage;
          lastRoundLabel = null;
        }
        // Show round_label as sub-header within playoffs if it changes
        if (m.stage == '2' && m.round_label && m.round_label !== lastRoundLabel) {
          html += `<div class="round-label">${m.round_label}</div>`;
          lastRoundLabel = m.round_label;
        }
        const hasScore = m.score1 !== '' && m.score1 != null && m.score2 !== '' && m.score2 != null;
        html += `
          <div class="match-row ${!hasScore ? 'no-score' : ''}">
            <span class="match-team ${m.winner === m.team1 ? 'winner' : ''}">${m.team1 || '—'}</span>
            <span class="match-score">${hasScore ? m.score1 + ' — ' + m.score2 : 'vs'}</span>
            <span class="match-team right ${m.winner === m.team2 ? 'winner' : ''}">${m.team2 || '—'}</span>
          </div>`;
      });
    }

    if (compAwards.length) {
      html += `<h3 class="modal-section-title">Awards</h3>`;
      const awardTypeFallback = {'Champion':0,'Runner-up':1,'Third Place':2,'Fourth Place':3,'Fifth Place':4,'Sixth Place':5,'Individual':99};
      const sortedAwards = [...compAwards].sort((a,b) => {
        const ao = a.order !== '' && a.order !== undefined ? parseFloat(a.order) : (awardTypeFallback[a.award_type] ?? 98);
        const bo = b.order !== '' && b.order !== undefined ? parseFloat(b.order) : (awardTypeFallback[b.award_type] ?? 98);
        return ao - bo;
      });
      sortedAwards.forEach(a => {
        if (!a.award) return;
        html += `<div class="award-row">
          <span class="award-name">${a.award}${a.description ? ' <span class="award-desc">' + a.description + '</span>' : ''}</span>
          <span class="award-recipient">${a.recipient_name || ''}</span>
        </div>`;
      });
    }

    document.getElementById('modalContent').innerHTML = html;
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }
</script>
</body>
</html>
