<!-- Team Profile View -->
<div id="teamProfileView" style="display:none">
  <div class="profile-hero">
    <div class="container">
      <a href="teams.html" class="back-link">← All Teams</a>
      <div class="profile-name" id="profileName"></div>
      <div class="profile-stats-row" id="profileStatsRow"></div>
    </div>
  </div>
  <div class="container" style="padding:2.5rem 0 4rem">
    <div class="profile-grid">
      <div>
        <h3 class="section-label">Tournament History</h3>
        <div id="profileHistory"></div>
      </div>
      <div>
        <h3 class="section-label">Match Results</h3>
        <div id="profileMatches"></div>
      </div>
    </div>
  </div>
</div>

<!-- Teams List View -->
<div id="teamsListView">
  <div class="page-header">
    <div class="container">
      <h1 class="page-title">Teams</h1>
      <p class="page-sub">Click any team to see their full history</p>
    </div>
  </div>
  <div class="container" style="padding-top:2rem">
    <input type="text" id="teamSearch" class="search-input" placeholder="Search teams..." style="max-width:400px">
  </div>
  <div class="container" style="padding:1.5rem 0 4rem">
    <div class="teams-grid" id="teamsGrid">
      <div class="loading">Loading teams...</div>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-logo"><img src="jff-logo.png" alt="JFF"></div>
    <p>Jakarta Flag Football · Est. 2022</p>
  </div>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    await loadData();
    const params = new URLSearchParams(window.location.search);
    const teamParam = params.get('team');
    if (teamParam) showTeamProfile(teamParam);
    else showTeamsList();
  });

  function showTeamsList() {
    document.getElementById('teamsListView').style.display = 'block';
    document.getElementById('teamProfileView').style.display = 'none';

    const teamStats = {};
    // Count W/L/D from actual match results
    matches.forEach(m => {
      if (m.score1 === '' || m.score1 == null || m.score2 === '' || m.score2 == null) return;
      for (const team of [m.team1, m.team2]) {
        if (!team) continue;
        if (!teamStats[team]) teamStats[team] = { wins:0, losses:0, draws:0, tournaments:new Set(), trophies:0 };
        teamStats[team].tournaments.add(m.competition);
      }
      if (m.winner === 'Draw') {
        if (teamStats[m.team1]) teamStats[m.team1].draws++;
        if (teamStats[m.team2]) teamStats[m.team2].draws++;
      } else if (m.winner) {
        if (teamStats[m.winner]) teamStats[m.winner].wins++;
        const loser = m.winner === m.team1 ? m.team2 : m.team1;
        if (teamStats[loser]) teamStats[loser].losses++;
      }
    });
    // Count titles from competitions champion column
    competitions.forEach(c => {
      if (c.champion && teamStats[c.champion]) teamStats[c.champion].trophies += 1;
    });
    // Convert tournament Sets to counts
    Object.values(teamStats).forEach(s => s.tournaments = s.tournaments.size);

    const sorted = Object.entries(teamStats).sort((a,b) => {
      if (b[1].trophies !== a[1].trophies) return b[1].trophies - a[1].trophies;
      const gp_a = a[1].wins + a[1].losses + a[1].draws;
      const gp_b = b[1].wins + b[1].losses + b[1].draws;
      if (gp_b !== gp_a) return gp_b - gp_a;
      if (b[1].tournaments !== a[1].tournaments) return b[1].tournaments - a[1].tournaments;
      return b[1].wins - a[1].wins;
    });
    renderTeamsGrid(sorted);

    document.getElementById('teamSearch').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      renderTeamsGrid(sorted.filter(([name]) => name.toLowerCase().includes(q)));
    });
  }

  function renderTeamsGrid(sorted) {
    const grid = document.getElementById('teamsGrid');
    if (!sorted.length) { grid.innerHTML = '<p class="empty">No teams found.</p>'; return; }
    grid.innerHTML = sorted.map(([name, stats]) => {
      const wr = stats.wins + stats.losses > 0
        ? Math.round(stats.wins / (stats.wins + stats.losses) * 100) : 0;
      return `
        <a href="teams.html?team=${encodeURIComponent(name)}" class="team-card">
          <div class="team-card-avatar">${name.charAt(0).toUpperCase()}</div>
          <div class="team-card-name">${name}</div>
          <div class="team-card-stats">
            <span>${stats.wins}W – ${stats.losses}L</span>
            <span class="wr-badge">${wr}%</span>
          </div>
          <div class="team-card-meta">
            ${stats.trophies > 0 ? `🏆 ${stats.trophies} title${stats.trophies>1?'s':''}  ·  ` : ''}
            ${stats.tournaments} tournament${stats.tournaments>1?'s':''}
          </div>
        </a>`;
    }).join('');
  }

  function showTeamProfile(teamName) {
    document.getElementById('teamsListView').style.display = 'none';
    document.getElementById('teamProfileView').style.display = 'block';
    document.title = `${teamName} — JFF Stats`;

    document.getElementById('profileName').textContent = teamName;

    const teamStandings = standings.filter(s => s.team === teamName);
    const teamMatches = matches.filter(m => m.team1 === teamName || m.team2 === teamName);

    let totalW=0, totalL=0, totalD=0, trophies=0;
    const tournamentsSet = new Set();
    // Count W/L/D from actual match results
    teamMatches.forEach(m => {
      if (m.score1 === '' || m.score1 == null || m.score2 === '' || m.score2 == null) return;
      tournamentsSet.add(m.competition);
      if (m.winner === 'Draw') totalD++;
      else if (m.winner === teamName) totalW++;
      else totalL++;
    });

    // Count titles from competitions champion column
    competitions.forEach(c => { if (c.champion === teamName) trophies++; });
    const wr = totalW+totalL > 0 ? Math.round(totalW/(totalW+totalL)*100) : 0;

    document.getElementById('profileStatsRow').innerHTML = `
      <div class="pstat"><span class="pstat-num">${totalW}</span><span class="pstat-label">Wins</span></div>
      <div class="pstat"><span class="pstat-num">${totalL}</span><span class="pstat-label">Losses</span></div>
      ${totalD > 0 ? `<div class="pstat"><span class="pstat-num">${totalD}</span><span class="pstat-label">Draws</span></div>` : ''}
      <div class="pstat"><span class="pstat-num">${wr}%</span><span class="pstat-label">Win Rate</span></div>
      <div class="pstat"><span class="pstat-num">${tournamentsSet.size}</span><span class="pstat-label">Tournaments</span></div>
      <div class="pstat"><span class="pstat-num">${trophies || '—'}</span><span class="pstat-label">Titles 🏆</span></div>
    `;

    // Tournament history — one row per competition, use final standings if available
    const compDates = {};
    competitions.forEach(c => compDates[c.name] = c.start_date);

    // Build W/L/D per tournament from actual match results
    const matchesByComp = {};
    teamMatches.forEach(m => {
      if (m.score1 === '' || m.score1 == null || m.score2 === '' || m.score2 == null) return;
      const comp = m.competition;
      if (!matchesByComp[comp]) matchesByComp[comp] = { w:0, l:0, d:0 };
      const winner = m.winner;
      if (winner === 'Draw') matchesByComp[comp].d++;
      else if (winner === teamName) matchesByComp[comp].w++;
      else matchesByComp[comp].l++;
    });

    // Get list of tournaments from matches (more complete than standings)
    const tournamentNames = [...new Set(teamMatches.map(m => m.competition))];

    // Build a placement map from competitions data
    const compPlacements = {};
    competitions.forEach(c => {
      compPlacements[c.name] = {
        champion: c.champion, runner_up: c.runner_up,
        third_place: c.third_place, fourth_place: c.fourth_place
      };
    });

    const histRows = tournamentNames
      .sort((a,b) => (compDates[b]||'').localeCompare(compDates[a]||''));

    document.getElementById('profileHistory').innerHTML = histRows.map(comp => {
      const p = compPlacements[comp] || {};
      const medal = p.champion === teamName ? '🥇'
        : p.runner_up === teamName ? '🥈'
        : p.third_place === teamName ? '🥉'
        : '';
      const rec = matchesByComp[comp] || { w:0, l:0, d:0 };
      const record = rec.d > 0 ? `${rec.w}W – ${rec.l}L – ${rec.d}D` : `${rec.w}W – ${rec.l}L`;
      return `
        <div class="history-row">
          <span class="history-medal">${medal}</span>
          <div class="history-info">
            <div class="history-comp">${comp}</div>
            <div class="history-date">${compDates[comp] || ''}</div>
          </div>
          <div class="history-record">${record}</div>
        </div>`;
    }).join('') || '<p class="empty">No tournament history found.</p>';

    // All matches with scores
    const sortedMatches = [...teamMatches]
      .filter(m => m.score1 !== '' && m.score1 != null && m.score1 !== undefined)
      .sort((a,b) => (b.date||'').localeCompare(a.date||''));

    document.getElementById('profileMatches').innerHTML = sortedMatches.map(m => {
      const isTeam1 = m.team1 === teamName;
      const myScore  = isTeam1 ? m.score1 : m.score2;
      const oppScore = isTeam1 ? m.score2 : m.score1;
      const opponent = isTeam1 ? m.team2 : m.team1;
      const result = m.winner === teamName ? 'W' : m.winner === 'Draw' ? 'D' : 'L';
      return `
        <div class="match-history-row">
          <span class="result-badge ${result.toLowerCase()}">${result}</span>
          <div class="mh-info">
            <div class="mh-opponent">vs ${opponent}</div>
            <div class="mh-comp">${m.competition} · ${m.date || ''}</div>
          </div>
          <div class="mh-score">${myScore} – ${oppScore}</div>
        </div>`;
    }).join('') || '<p class="empty">No match results found.</p>';
  }
</script>
